# Honeycomb agent configuration.
#
# The `inference:` block wires the model-provider router (PRD-010) that the daemon's
# dreaming loop (PRD-009 / PRD-026) and the memory pipeline call through. The daemon reads
# this file from the WORKSPACE ROOT ($HONEYCOMB_WORKSPACE, defaulting to the daemon's cwd)
# at assembly via `buildInferenceModelClient`; when this file or the `inference:` block is
# absent the daemon boots cleanly with the no-op model client (dreaming yields empty,
# zero-mutation passes).
#
# SECURITY (PRD-010a a-AC-4): the credential is a `${SECRET_REF}` reference ONLY — an inline
# raw key is REJECTED at parse. The referenced secret (ANTHROPIC_API_KEY) lives in the
# machine-bound encrypted `.secrets/` store under the daemon's tenancy scope, NOT in this
# file. This file is committed and contains NO secret.

inference:
  # ── Accounts: a provider credential, referenced by secret name (never inline). ──
  accounts:
    - id: anthropic
      provider: anthropic
      apiKey: "${ANTHROPIC_API_KEY}"

  # ── Targets: a concrete model on an account, with its privacy tier + capabilities. ──
  targets:
    - id: claude-sonnet
      account: anthropic
      model: claude-sonnet-4-6
      privacy: private
      capabilities: [chat]
      contextWindow: 200000

  # ── Policies: how a workload selects among targets. `strict` tries the chain in order. ──
  policies:
    - id: dreaming-policy
      mode: strict
      chain: [claude-sonnet]

  # ── Workloads: bind a policy + the gate floors. `memory_dreaming` is the dreaming loop. ──
  workloads:
    - name: memory_dreaming
      policy: dreaming-policy
      minPrivacyTier: private
      requiredCapabilities: [chat]
