name: Bug report
description: Something in Honeycomb is broken or behaving wrong
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file this. The more specific you are, the faster we can act on it.

        Do not report security vulnerabilities here. See [SECURITY.md](../blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you do, and what went wrong?
      placeholder: I ran X and got Y instead of Z.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
      description: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Exact steps. A minimal reproduction is worth more than a paragraph.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Honeycomb is involved?
      options:
        - Daemon
        - CLI (honeycomb)
        - MCP server
        - Harness client
        - Embeddings daemon
        - SDK
        - Not sure
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of the version command, or the commit SHA you're on.
      placeholder: "0.1.0 / abc1234"
    validations:
      required: true
  - type: input
    id: harness
    attributes:
      label: Harness
      description: Which coding harness were you running it under, if any?
      placeholder: e.g. Claude Code, Cursor
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, and anything else relevant about the machine.
      placeholder: |
        - OS:
        - Node:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Relevant logs, stack traces, or error output. This is automatically formatted as code.
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this isn't a duplicate
          required: true
        - label: This is not a security vulnerability (those go to SECURITY.md)
          required: true
