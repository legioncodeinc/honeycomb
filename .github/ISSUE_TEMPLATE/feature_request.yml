name: Feature request
description: Suggest a capability or change for Honeycomb
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        For anything substantial, it's worth opening this before you build it. Saves you from writing something that gets turned down on direction.
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What are you trying to do that Honeycomb doesn't let you do today? Lead with the problem, not the solution.
      placeholder: I'm trying to X, but...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? How would it work?
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Honeycomb would this touch?
      options:
        - Daemon
        - CLI (honeycomb)
        - MCP server
        - Harness client
        - Embeddings daemon
        - SDK
        - Cross-cutting / not sure
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why you ruled them out.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this isn't already requested
          required: true
