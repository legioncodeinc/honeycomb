# Deploy the get.theapiary.sh install surface (site/install/) to Cloudflare Pages.
#
# Model A — Direct Upload via Wrangler. The Pages project `honeycomb-install` (production branch
# `production`) + the custom domain get.theapiary.sh are pre-provisioned in the Legion Code Inc.
# Cloudflare account. This workflow builds site/install/ and promotes a release tag to production.
#
# Triggers: a pushed release tag (v*), or manual dispatch. Deploys are intentionally NOT on every
# push to main, so the script served at get.theapiary.sh — and its published SHA-256 — stay stable
# between releases (see site/install/README.md "Version pinning").
#
# Required repo secret: CLOUDFLARE_API_TOKEN (Account → Cloudflare Pages → Edit).
# The account id is not secret and is inlined below.

name: Deploy install site (get.theapiary.sh)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

# Don't pile up concurrent deploys to the same Pages project.
concurrency:
  group: deploy-install-site
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # SECURITY: Require manual approval via a protected environment before deploying installer
    # scripts to production. This mitigates the risk of an attacker with tag-creation permissions
    # deploying malicious installer bytes to get.theapiary.sh by pushing an arbitrary v* tag.
    # The environment must be configured in repo Settings → Environments → production with
    # required reviewers (trusted maintainers only). See SECURITY.md.
    environment:
      name: production
      url: https://get.theapiary.sh
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          # This job only builds + deploys to Cloudflare; it never pushes back to the repo,
          # so don't persist the GITHUB_TOKEN into the checkout (artipacked hardening).
          persist-credentials: false
          # Fetch enough history to verify the tag is reachable from main (next step).
          fetch-depth: 0

      # SECURITY: Verify the triggering tag is reachable from the protected main branch.
      # This ensures the tag's tree has passed through main's required PR reviews + status
      # checks (ci.yaml quality gate). An attacker who pushes a v* tag pointing to an
      # arbitrary commit NOT on main will fail this check and the deploy will abort before
      # any malicious installer bytes reach the build or Cloudflare. Tags created via the
      # GitHub UI or `git tag && git push origin <tag>` from a local main that is up-to-date
      # with origin/main will pass (the tag is an ancestor of or equal to main). Skipped on
      # workflow_dispatch (no tag to verify; manual deploys from main are operator-initiated).
      - name: Guard — verify tag is on protected main branch
        if: github.event_name == 'push' && github.ref_type == 'tag'
        run: |
          TAG_SHA="$(git rev-parse HEAD)"
          MAIN_SHA="$(git rev-parse origin/main)"
          echo "Triggered by tag: ${{ github.ref_name }} (commit $TAG_SHA)"
          echo "Protected main:   origin/main (commit $MAIN_SHA)"
          
          # Check if the tag commit is reachable from main (i.e., the tag is on main or an ancestor).
          if ! git merge-base --is-ancestor "$TAG_SHA" "$MAIN_SHA"; then
            echo "::error::SECURITY: Tag ${{ github.ref_name }} (commit $TAG_SHA) is NOT reachable from the protected main branch (commit $MAIN_SHA). Only tags that exist on main — and have therefore passed PR reviews + CI quality gates — may deploy to production. Push the tag's commit to main first, or re-tag a commit that is already on main."
            exit 1
          fi
          
          echo "✓ Tag ${{ github.ref_name }} is reachable from protected main — proceeding with deploy."

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"

      - name: Build the install surface (copies scripts, hashes them, renders the page)
        # PRD-002c: HONEYCOMB_INSTALL_POSTHOG_KEY is a PostHog PROJECT key, safe to expose
        # client-side by design (ADR-0002) — it is a plain repository VARIABLE (Settings →
        # Secrets and variables → Actions → Variables), never a secret. Absent/unset leaves
        # install-time telemetry disabled (build.mjs's documented no-op default); nothing here
        # gates the build or the deploy on it being configured.
        env:
          HONEYCOMB_INSTALL_POSTHOG_KEY: ${{ vars.HONEYCOMB_INSTALL_POSTHOG_KEY }}
        run: node site/install/build.mjs

      - name: Deploy to Cloudflare Pages (production)
        uses: cloudflare/wrangler-action@v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 893c7bdc0782f11d23ebd2da8926c132
          command: >-
            pages deploy site/install/dist
            --project-name=honeycomb-install
            --branch=production
