name: CLA

# Enforces the Contributor License Agreement (CLA.md) on pull requests.
# First-time contributors are prompted to sign by commenting on their PR;
# their signature is recorded in a JSON file in the branch named below.
#
# SETUP REQUIRED before this works:
#   1. Create a Personal Access Token (classic, `repo` scope) on an account
#      that can write to this repo, and add it as a repo secret named
#      PERSONAL_ACCESS_TOKEN. (GITHUB_TOKEN handles PR comments.)
#   2. Decide where signatures live. Default below stores them in a
#      `cla-signatures` branch of this repo. Create that branch (can be empty).
#   3. Keep `path-to-document` pointed at CLA.md on the default branch.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: read
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: "signatures/cla.json"
          path-to-document: "https://github.com/legioncodeinc/honeycomb/blob/main/CLA.md"
          branch: "cla-signatures"
          allowlist: "dependabot[bot]"
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          custom-notsigned-prcomment: "Thanks for the PR. Before we can merge, please read our [CLA](https://github.com/legioncodeinc/honeycomb/blob/main/CLA.md) and sign it by posting the comment below."
