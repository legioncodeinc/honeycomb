name: CLA

# Enforces the Contributor License Agreement (CLA.md) on pull requests.
# First-time contributors are prompted to sign by commenting on their PR;
# their signature is recorded in a JSON file in the branch named below.
#
# SETUP REQUIRED before this works:
#   1. Signatures are stored in the `cla-signatures` branch of THIS repo; the
#      workflow's own GITHUB_TOKEN commits them (the `permissions: contents: write`
#      below grants that). No Personal Access Token is needed for same-repo storage.
#      (A PAT is only required if you move signatures to a SEPARATE/private repo.)
#   2. The `cla-signatures` branch must exist (can be empty) and must NOT be protected.
#   3. Keep `path-to-document` pointed at CLA.md on the default branch.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  # contents: write lets the auto-generated GITHUB_TOKEN commit the signature file to the
  # `cla-signatures` branch in THIS repo (the bot was failing with "Resource not accessible by
  # integration" under contents: read). Scoped to this repo + expires when the job ends; the
  # workflow runs no PR-authored code (no checkout), so the pull_request_target write risk
  # does not apply here.
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        # Pinned to the v2.6.1 commit SHA (not the mutable tag) so a compromised tag cannot
        # introduce new code into a contents:write run.
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          # Same-repo signature storage (the `cla-signatures` branch) only needs the
          # workflow's own GITHUB_TOKEN now that contents:write is granted — no long-lived
          # PERSONAL_ACCESS_TOKEN in the path.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: "signatures/cla.json"
          path-to-document: "https://github.com/legioncodeinc/honeycomb/blob/main/CLA.md"
          branch: "cla-signatures"
          # `release-bot` is the release-automation identity (commit email
          # release-bot@users.noreply.github.com, which GitHub resolves to the
          # handle `release-bot`). It authors the changeset/version-bump commits
          # from release-gate.yaml, which are machine-generated and not covered
          # by the CLA. The `*-release-bot` wildcard also covers the per-repo
          # display names (honeycomb-release-bot, etc.).
          allowlist: "dependabot[bot],release-bot,*-release-bot"
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          custom-notsigned-prcomment: "Thanks for the PR. Before we can merge, please read our [CLA](https://github.com/legioncodeinc/honeycomb/blob/main/CLA.md) and sign it by posting the comment below."
