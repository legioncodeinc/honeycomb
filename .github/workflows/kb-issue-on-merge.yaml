name: KB issue on merge

# When a PR merges, open a "knowledge" issue capturing the PR context so the
# knowledge base can be updated to reflect the change.
on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  open-kb-issue:
    # Only on actual merge, not a plain close.
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Open knowledge issue from merged PR
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          PR_BODY: ${{ github.event.pull_request.body }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Files touched (path + add/del counts), capped so the body stays sane.
          files_md="$(gh pr view "$PR_NUMBER" --repo "$REPO" \
            --json files \
            --jq '.files[:100] | map("- `\(.path)` (+\(.additions)/-\(.deletions))") | join("\n")')"
          file_count="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json files --jq '.files | length')"

          # Truncate PR body to keep the issue readable.
          pr_body_excerpt="$(printf '%s' "${PR_BODY:-}" | head -c 2000)"
          [ -z "$pr_body_excerpt" ] && pr_body_excerpt="_(no PR description)_"

          body="$(cat <<EOF
          A merged PR may require knowledge-base updates. Review the change and update \`library/\` as needed.

          ## Source PR
          - **PR:** [#${PR_NUMBER}](${PR_URL}) - ${PR_TITLE}
          - **Author:** @${PR_AUTHOR}
          - **Merged into:** \`${PR_BASE}\`
          - **Files changed:** ${file_count}

          ## PR description
          ${pr_body_excerpt}

          ## Files touched
          ${files_md}

          ---
          _Auto-generated by \`.github/workflows/kb-issue-on-merge.yaml\` on merge._
          EOF
          )"

          # Idempotency guard: a manual rerun or post-failure retry must not open
          # a second issue for the same PR. Match on the stable title prefix.
          existing_issue="$(gh issue list \
            --repo "$REPO" \
            --label knowledge \
            --state all \
            --search "\"KB: review merged PR #${PR_NUMBER}\" in:title" \
            --json number \
            --jq '.[0].number // empty')"

          if [ -n "$existing_issue" ]; then
            echo "Knowledge issue already exists: #${existing_issue} - skipping."
            exit 0
          fi

          gh issue create \
            --repo "$REPO" \
            --title "KB: review merged PR #${PR_NUMBER} - ${PR_TITLE}" \
            --label knowledge \
            --body "$body"
