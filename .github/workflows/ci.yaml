name: CI

# The quality gate on every push to main and every PR into main. It runs the
# SAME recipe a developer runs locally — `npm run ci` (= typecheck + jscpd dup +
# vitest + audit:sql) plus the build and publish-surface scanners (audit:openclaw,
# pack:check) — so a green local gate predicts a green CI (ci-release-stinger
# principle #4: local equals CI).
#
# ── TRIGGER / GATING MATRIX (PRD-034 D-1 / AC-1 / AC-4) ──────────────────────
# The REQUIRED merge gate is the DETERMINISTIC suite ONLY: `quality-gate`
# (Node 22/24) + `windows-smoke`. Those are backend-independent (PRD-031 plain-CI
# assembled tests + unit + typecheck + build + audits) so a slow/502 DeepLake can
# never red a merge.
#
#   trigger          | quality-gate | windows-smoke | integration-push-soft | integration-nightly | deeplake-stress
#   -----------------|--------------|---------------|-----------------------|---------------------|----------------
#   pull_request     |   BLOCKS     |    BLOCKS     |        —              |         —           |       —
#   push (main)      |   BLOCKS     |    BLOCKS     |  runs, SOFT (no-block)|         —           |       —
#   schedule (07:00) |   runs       |    runs       |        —              |  runs, HARD (canary)|       —
#   workflow_dispatch|   runs       |    runs       |        —              |         —           |  runs (token-gated)
#
# The live suite is therefore: SOFT on push (informational, never merge-blocking),
# HARD nightly (a real regression honestly reds the scheduled run), and runnable
# manually. Both live jobs preserve the `gate`→`has_token` skip-safe guard: no
# token ⇒ SKIPPED, never failed. The on-demand stress job runs ONLY via
# `workflow_dispatch`, is token-gated the same way, and NEVER gates anything.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Nightly run of the live-DeepLake integration suite as a HARD canary. The suite
  # otherwise only fires informationally on `push` (merges to main), so a real
  # backend can regress between merges and go unnoticed for days; a scheduled run
  # catches drift on the real org without waiting for the next merge. 07:00 UTC is
  # deliberately off-peak — roughly 23:00–00:00 US Pacific / 02:00–03:00 US Eastern
  # — so it never contends with working-hours push/PR CI load, and it lands on a
  # fresh free-tier minute budget for the day. Still skip-safe: a scheduled run with
  # no token (or on a fork, where scheduled workflows do not run anyway) hits the
  # same `gate`→`has_token=false` path and SKIPS the integration job, staying green.
  schedule:
    - cron: '0 7 * * *'
  # Manual entry point. Lets a maintainer run the live suite on demand AND drive the
  # on-demand DeepLake stress harness (the `deeplake-stress` job below runs ONLY on
  # this trigger). The inputs expose the stress dials (PRD-034b FR-6); they are
  # ignored by every other job.
  workflow_dispatch:
    inputs:
      run_live_integration:
        description: 'Also run the live integration suite (not just stress).'
        type: boolean
        default: false
      stress_concurrency:
        description: 'Stress: CSV concurrency sweep (HONEYCOMB_STRESS_CONCURRENCY), e.g. "1,4,8".'
        type: string
        default: '1,4,8'
      stress_ops:
        description: 'Stress: append operations per level (HONEYCOMB_STRESS_OPS).'
        type: string
        default: '20'
      stress_versions:
        description: 'Stress: versions seeded per key (HONEYCOMB_STRESS_VERSIONS).'
        type: string
        default: '3'
      stress_seed:
        description: 'Stress: fixed RNG seed for a reproducible run (HONEYCOMB_STRESS_SEED).'
        type: string
        default: '1234'

# Cancel a superseded run on the same ref (a force-push or a new commit on a PR)
# so CI minutes are not spent on a stale commit.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: the gate only reads the repo. The two live jobs upload an
# artifact (the redaction-safe infra-degraded sentinel / the stress report), which
# needs no extra scope beyond the default token's ability to write run artifacts.
# No job here comments, pushes, or publishes (ci-release-stinger principle #7).
permissions:
  contents: read

jobs:
  # ── The quality gate. Runs across the supported Node majors. ───────────────
  # The matrix is the engine-compatibility canary: honeycomb is `engines.node
  # >=22`, so the gate runs on 22.x (the floor) and 24.x (the next even/LTS-line
  # major) to prove a clean install + the full gate works across the range, not
  # just one pinned version. `npm ci` installs against the committed lockfile.
  # THIS JOB (with windows-smoke) IS THE REQUIRED MERGE GATE.
  quality-gate:
    name: Quality gate (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['22.x', '24.x']
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          persist-credentials: false

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      # `npm ci` runs the `postinstall` (ensure-tree-sitter) step. In this
      # skeleton there are no tree-sitter deps, so the script logs and exits 0 —
      # it cannot hard-fail a clean install. We deliberately do NOT set
      # HONEYCOMB_STRICT_POSTINSTALL here: strict mode only turns a *heal miss*
      # into a red check, and with no grammars there is nothing to heal yet.
      - name: Install (npm ci)
        run: npm ci

      # `npm run ci` = typecheck && dup && test && audit:sql. Discrete from the
      # build/audit steps below so a failure points at the exact gate stage.
      - name: Quality gate (typecheck + dup + test + audit:sql)
        run: npm run ci

      # The build is `tsc && node esbuild.config.mjs` — both must run. The
      # `prebuild` (sync-versions) runs first and keeps every manifest version
      # single-sourced.
      - name: Build (tsc + esbuild bundles)
        run: npm run build

      # Publish-surface scanners: replicate the ClawHub static scan over the
      # OpenClaw bundle, then prove `npm pack`'s tarball carries no forbidden
      # filenames. Pack once without rerunning lifecycle scripts, then reuse that
      # exact artifact and npm manifest in both package gates.
      - name: Audit OpenClaw bundle (ClawHub rules)
        run: npm run audit:openclaw

      - name: Pack once for artifact gates
        run: npm run pack:prepare

      - name: Pack-check (tarball secret/forbidden-file scan)
        run: npm run pack:check

      - name: Packed CLI + Hermes conformance
        run: npm run test:packed-cli

  minimum-node-packed-hermes:
    name: Packed Hermes conformance (minimum Node 22.5.0)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          persist-credentials: false
      - name: Setup minimum supported Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '22.5.0'
          cache: npm
      - name: Install
        run: npm ci
      - name: Build and execute packed Hermes artifacts
        run: npm run test:packed-hermes

  # ── Windows smoke. The dev host is Windows and the build scripts
  # (esbuild.config.mjs chmod, pack-check.mjs) have win32 branches that Linux CI
  # would never exercise. One pinned Node major is enough here — the Node matrix
  # lives on the Linux gate; this proves the win32 code paths build + test.
  # THIS JOB (with quality-gate) IS THE REQUIRED MERGE GATE.
  windows-smoke:
    name: Windows smoke (build + test)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '22.x'
          cache: npm

      - name: Install (npm ci)
        run: npm ci

      - name: Build (win32 paths)
        run: npm run build

      # Load-smoke the BUILT daemon bundle. The Vitest suite assembles the daemon
      # in-process and never imports the esbuild bundle, so a bundle-only break
      # (e.g. a transitively-bundled CJS dep doing a dynamic `require` the ESM
      # bundle can't run) ships green and only surfaces on `honeycomb daemon start`.
      # This asserts `daemon/index.js` loads without a bundling/module error.
      - name: Smoke — daemon bundle loads
        run: npm run smoke:daemon-bundle

      - name: Test
        run: npm run test

      - name: Packed CLI + Hermes conformance (Windows)
        run: npm run test:packed-cli

  macos-service-smoke:
    name: macOS service adapter + packed CLI
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '22.x'
          cache: npm
      - name: Install
        run: npm ci
      - name: Native launchd adapter tests
        run: npm test -- --run tests/cli/daemon-service.test.ts tests/cli/daemon-lifecycle-service.test.ts tests/commands/standard-interface.test.ts
      - name: Packed CLI + Hermes conformance (macOS)
        run: npm run test:packed-cli

  # ── Secret gate. ───────────────────────────────────────────────────────────
  # The `secrets` context is NOT available in a job-level `if:`, so a tiny job
  # reads the token in a `run` step (secrets ARE allowed in run/env) and emits a
  # boolean the live + stress jobs key off. On a fork or before the secret is set,
  # the token is empty -> `has_token=false` -> those jobs are SKIPPED (not failed),
  # so the initial green state holds. This guard is preserved VERBATIM from before
  # the PRD-034 rewire — it carries no job-level `if:`, so it runs on every trigger
  # (push, pull_request, schedule, workflow_dispatch) and its `has_token` output is
  # always available to every `needs`-dependent job.
  gate:
    name: Secret gate
    runs-on: ubuntu-latest
    outputs:
      has_token: ${{ steps.check.outputs.has_token }}
    steps:
      - id: check
        env:
          TOKEN: ${{ secrets.HONEYCOMB_DEEPLAKE_TOKEN }}
        run: |
          if [ -n "$TOKEN" ]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
          fi

  # ── OPT-IN live-DeepLake integration suite — PUSH-SOFT (non-blocking). ──────
  # Runs on a merge to `main` as an INFORMATIONAL check. `continue-on-error: true`
  # makes its result NON-BLOCKING: a red (or even a hard failure) here does NOT
  # fail the workflow's required status, so the live suite can NEVER block a push
  # merge (D-1 / AC-1 / AC-4). The deterministic gate (quality-gate + windows-smoke)
  # is the only thing that can red a push. Skip-safe guard preserved: no token ⇒
  # SKIPPED. The shared composite carries the retry wrapper + infra-skip→neutral
  # mapping, so even on push a transient backend storm resolves NEUTRAL, not red.
  integration-push-soft:
    name: Live DeepLake integration (push, non-blocking)
    runs-on: ubuntu-latest
    needs: [quality-gate, gate]
    # SOFT: never contributes a failing required status to the push run.
    continue-on-error: true
    if: ${{ github.event_name == 'push' && needs.gate.outputs.has_token == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          persist-credentials: false
      - name: Run live integration (shared body)
        uses: ./.github/actions/live-integration
        with:
          deeplake-endpoint: ${{ secrets.HONEYCOMB_DEEPLAKE_ENDPOINT }}
          deeplake-token: ${{ secrets.HONEYCOMB_DEEPLAKE_TOKEN }}
          deeplake-org: ${{ secrets.HONEYCOMB_DEEPLAKE_ORG }}
          deeplake-workspace: ${{ secrets.HONEYCOMB_DEEPLAKE_WORKSPACE }}
          run-id: ${{ github.run_id }}

  # ── OPT-IN live-DeepLake integration suite — NIGHTLY (HARD canary). ─────────
  # Runs on the nightly `schedule` (and on a manual `workflow_dispatch` when the
  # operator opts in via `run_live_integration`). This is the HARD canary: NO
  # `continue-on-error`, so a genuine regression on the real backend honestly reds
  # the scheduled run. The shared composite still maps a SUSTAINED infra outage to
  # NEUTRAL (D-2 / AC-3) — a backend storm is not a code red — but a real
  # correctness/wiring failure with no infra-degraded marker STILL fails this job.
  # Infra-neutral never masks a real regression. Skip-safe guard preserved: no
  # token ⇒ SKIPPED.
  integration-nightly:
    name: Live DeepLake integration (nightly canary)
    runs-on: ubuntu-latest
    needs: [quality-gate, gate]
    # HARD: this job's success/failure is real. (No continue-on-error.)
    if: >-
      ${{
        (github.event_name == 'schedule' ||
         (github.event_name == 'workflow_dispatch' && inputs.run_live_integration))
        && needs.gate.outputs.has_token == 'true'
      }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          persist-credentials: false
      - name: Run live integration (shared body)
        uses: ./.github/actions/live-integration
        with:
          deeplake-endpoint: ${{ secrets.HONEYCOMB_DEEPLAKE_ENDPOINT }}
          deeplake-token: ${{ secrets.HONEYCOMB_DEEPLAKE_TOKEN }}
          deeplake-org: ${{ secrets.HONEYCOMB_DEEPLAKE_ORG }}
          deeplake-workspace: ${{ secrets.HONEYCOMB_DEEPLAKE_WORKSPACE }}
          run-id: ${{ github.run_id }}

  # ── ON-DEMAND DeepLake STRESS harness (PRD-034b / D-4 / AC-5 / b-AC-6). ─────
  # A diagnostic load generator that reproduces DeepLake's latency/error behavior
  # on command and emits a metrics report for the vendor. It runs ONLY via
  # `workflow_dispatch` — NEVER on push, PR, or schedule (b-AC-6) — and NEVER gates
  # anything (it is not in any `needs` chain a required check depends on, and the
  # merge gate is quality-gate + windows-smoke only). Token-gated via the same
  # `gate`→`has_token` guard: no token ⇒ SKIPPED, never failed. The four
  # HONEYCOMB_DEEPLAKE_* secrets are passed via `env:` exactly like the live jobs.
  # The JSON report (034b's exported `StressReport`, schemaVersion 1) is written to
  # a pinned `.stress-report/` dir and uploaded via actions/upload-artifact.
  deeplake-stress:
    name: DeepLake stress (on-demand, workflow_dispatch only)
    runs-on: ubuntu-latest
    needs: [gate]
    if: ${{ github.event_name == 'workflow_dispatch' && needs.gate.outputs.has_token == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '22.x'
          cache: npm

      - name: Install (npm ci)
        run: npm ci

      # Drive the on-demand load generator. A saturated/erroring backend is
      # captured AS DATA in the report (latency percentiles, error-by-status,
      # convergence time, throughput) — it is NOT a build failure. The dials
      # (FR-6) travel via the HONEYCOMB_STRESS_* env vars the script reads; we pin
      # HONEYCOMB_STRESS_REPORT_DIR so the upload step reads ONE documented path.
      - name: Run DeepLake stress harness
        shell: bash
        env:
          HONEYCOMB_DEEPLAKE_ENDPOINT: ${{ secrets.HONEYCOMB_DEEPLAKE_ENDPOINT }}
          HONEYCOMB_DEEPLAKE_TOKEN: ${{ secrets.HONEYCOMB_DEEPLAKE_TOKEN }}
          HONEYCOMB_DEEPLAKE_ORG: ${{ secrets.HONEYCOMB_DEEPLAKE_ORG }}
          HONEYCOMB_DEEPLAKE_WORKSPACE: ${{ secrets.HONEYCOMB_DEEPLAKE_WORKSPACE }}
          HONEYCOMB_CI_RUN_ID: ${{ github.run_id }}
          HONEYCOMB_STRESS_REPORT_DIR: ${{ github.workspace }}/.stress-report
          # Stress dials (FR-6) from the workflow_dispatch inputs (defaults applied
          # by the input definitions above; the script also clamps via zod).
          HONEYCOMB_STRESS_CONCURRENCY: ${{ inputs.stress_concurrency }}
          HONEYCOMB_STRESS_OPS: ${{ inputs.stress_ops }}
          HONEYCOMB_STRESS_VERSIONS: ${{ inputs.stress_versions }}
          HONEYCOMB_STRESS_SEED: ${{ inputs.stress_seed }}
        run: npm run deeplake:stress

      # Upload the metrics report (human + JSON). `if: always()` so a runner hiccup
      # still surfaces whatever landed. The report is redaction-safe by 034b
      # contract (b-AC-7: no token / endpoint / full-org).
      - name: Upload stress metrics report
        if: always()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: deeplake-stress-report-${{ github.run_id }}
          path: ${{ github.workspace }}/.stress-report/
          if-no-files-found: warn
          retention-days: 30
