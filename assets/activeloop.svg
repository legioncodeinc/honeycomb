<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Activeloop Deep Lake">
  <title>Activeloop Deep Lake</title>
  <defs>
    <linearGradient id="al" x1="0.12" y1="0.95" x2="0.9" y2="0.08">
      <stop offset="0" stop-color="#EE6A18"/>
      <stop offset="0.52" stop-color="#F8881C"/>
      <stop offset="1" stop-color="#FCB852"/>
    </linearGradient>
  </defs>
  <!-- Torus loop: outer ring with the hole cut via even-odd fill -->
  <path fill="url(#al)" fill-rule="evenodd"
        d="M91 256 a165 165 0 1 0 330 0 a165 165 0 1 0 -330 0 Z
           M164 256 a92 92 0 1 1 184 0 a92 92 0 1 1 -184 0 Z"/>
  <!-- soft inner highlight to give the band depth -->
  <circle cx="256" cy="256" r="128" fill="none" stroke="#FFDFA8" stroke-opacity="0.55" stroke-width="7"/>
  <!-- top-left light rim suggesting the loop's twist -->
  <path d="M141 196 a165 165 0 0 1 150 -78" fill="none" stroke="#FFE7BE" stroke-opacity="0.6" stroke-width="9" stroke-linecap="round"/>
</svg>
