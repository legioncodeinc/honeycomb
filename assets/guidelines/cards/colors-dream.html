<!-- @dsCard group="Colors" viewport="700x160" name="Dream — Violet" subtitle="Reserved for the Dreaming consolidation loop & night states" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-canvas); display: flex; align-items: center; gap: 20px; }
  .states { display: flex; gap: 12px; flex: 1; }
  .st { flex: 1; height: 84px; border-radius: var(--radius-md); display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; }
  .n { font-family: var(--font-mono); font-size: 11px; font-weight: 600; }
  .demo { width: 200px; height: 84px; border-radius: var(--radius-lg); border: 1px solid var(--dream-border); background: var(--dream-subtle); display: flex; align-items: center; gap: 10px; padding: 0 14px; }
  .pulse { width: 14px; height: 14px; border-radius: 50%; background: var(--dream); box-shadow: var(--glow-dream); animation: p var(--dur-dream) var(--ease-in-out) infinite alternate; }
  @keyframes p { from { opacity: .4; } to { opacity: 1; } }
  .dtext { font-family: var(--font-mono); font-size: 12px; color: var(--dream); }
</style>
</head>
<body>
  <div class="states">
    <div class="st" style="background:var(--dream)"><span class="n" style="color:var(--dream-on)">dream</span></div>
    <div class="st" style="background:var(--dream-hover)"><span class="n" style="color:var(--dream-on)">hover</span></div>
    <div class="st" style="background:var(--dream-subtle); border:1px solid var(--dream-border)"><span class="n" style="color:var(--dream)">subtle</span></div>
  </div>
  <div class="demo"><span class="pulse"></span><span class="dtext">dreaming…</span></div>
</body>
</html>
